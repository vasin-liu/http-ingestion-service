name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Backend tests
        run: |
          ./mvnw -pl http-ingestion-boot -am test \
            -Dtest=HttpIngestionE2ETest,OpenApiImportE2ETest,JiaduSignVerifierTest,RequestBodyComposerTest,TransformPipelineTest,PostgreSql*,KafkaSinkE2ETest,OpenApiImportServiceTest \
            -Dsurefire.failIfNoSpecifiedTests=false

  ui-e2e:
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: http-ingestion-admin-ui/package-lock.json
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Build jar
        run: ./mvnw -pl http-ingestion-boot -am package -DskipTests
      - name: Playwright E2E
        working-directory: http-ingestion-admin-ui
        env:
          E2E_SERVER_PORT: '18080'
          CI: 'true'
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: http-ingestion-admin-ui/playwright-report/
