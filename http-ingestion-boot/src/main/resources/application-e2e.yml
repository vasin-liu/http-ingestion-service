server:
  port: ${SERVER_PORT:18080}

spring:
  datasource:
    url: jdbc:h2:mem:e2e-ui;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

ingestion:
  external-pg:
    url: ${EXTERNAL_PG_URL:}
    username: ${EXTERNAL_PG_USER:}
    password: ${EXTERNAL_PG_PASSWORD:}
  external-kafka:
    bootstrap-servers: ${EXTERNAL_KAFKA_BOOTSTRAP_SERVERS:}

logging:
  level:
    com.pcitech.http.ingestion: INFO
